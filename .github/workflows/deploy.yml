name: 部署到 Hostinger WordPress

on:
  push:
    branches: [master, main]
  workflow_dispatch:  # 允許在 GitHub 後台手動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: SSH 進入 Hostinger 並部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002  # Hostinger 固定使用 65002，非標準的 22
          script: |
            cd ${{ secrets.REPO_PATH }}
            git fetch origin
            git reset --hard origin/main
            # 自動安裝 WP-CLI（如果尚未安裝）
            if ! command -v wp &>/dev/null && [ ! -f "$HOME/bin/wp" ]; then
              mkdir -p "$HOME/bin"
              curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x wp-cli.phar
              mv wp-cli.phar "$HOME/bin/wp"
            fi
            export PATH="$HOME/bin:$PATH"
            # 清理先前誤部署到 mu-plugins 的 shortcode 檔案（避免 500 錯誤）
            MU_DIR="${{ secrets.WP_PATH }}/wp-content/mu-plugins"
            for f in shortcodes/*.php; do
              [ -f "$f" ] && rm -f -- "$MU_DIR/$(basename "$f")" 2>/dev/null
            done
            WP_PATH=${{ secrets.WP_PATH }} bash scripts/deploy.sh
