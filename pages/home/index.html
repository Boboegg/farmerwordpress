<style>
/* 首頁 L3 Director Cut（內容不變，僅升級視覺與互動） */
.dc-home {
    position: relative;
    width: 100%;
    padding: clamp(48px, 8vw, 96px) 0;
    margin: 0;
    font-family: "Noto Sans TC", sans-serif;
    overflow: hidden;
    isolation: isolate;
    background:
        radial-gradient(1200px 420px at 10% 8%, color-mix(in srgb, var(--color-accent) 15%, transparent), transparent 62%),
        radial-gradient(980px 420px at 88% 22%, color-mix(in srgb, var(--color-brand) 15%, transparent), transparent 64%),
        linear-gradient(180deg, color-mix(in srgb, var(--color-bg) 88%, #ffffff), var(--color-bg));
}

.dc-home-atmosphere {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: -1;
}

.dc-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(22px);
    opacity: 0.45;
}

.dc-orb-a {
    width: 240px;
    height: 240px;
    left: -56px;
    top: 32px;
    background: color-mix(in srgb, var(--color-accent) 50%, transparent);
}

.dc-orb-b {
    width: 300px;
    height: 300px;
    right: -80px;
    top: 120px;
    background: color-mix(in srgb, var(--color-brand) 58%, transparent);
}

.dc-grid-noise {
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(to right, color-mix(in srgb, var(--color-line) 26%, transparent) 1px, transparent 1px),
        linear-gradient(to bottom, color-mix(in srgb, var(--color-line) 20%, transparent) 1px, transparent 1px);
    background-size: 38px 38px;
    opacity: 0.3;
}

.topic-header {
    text-align: center;
    margin-bottom: clamp(28px, 4vw, 48px);
}

.topic-header h2 {
    margin: 0 0 10px;
    font-family: "Noto Serif TC", serif;
    font-size: clamp(2rem, 5.2vw, 3rem);
    color: var(--color-text);
    font-weight: 900;
    line-height: 1.2;
    letter-spacing: 0.04em;
}

.topic-header .highlight {
    color: var(--color-brand-deep);
    position: relative;
    display: inline-block;
}

.topic-header .highlight::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 4px;
    width: 100%;
    height: 12px;
    z-index: -1;
    background: color-mix(in srgb, var(--color-accent) 34%, transparent);
}

.topic-header > p {
    margin: 0;
    font-size: 1.05rem;
    color: var(--color-muted);
}

.topic-container {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 20px;
    align-items: stretch;
}

.topic-card {
    min-height: 340px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-decoration: none;
    color: var(--color-text);
    border: 1px solid var(--color-line);
    background:
        linear-gradient(160deg, color-mix(in srgb, var(--color-bg-elevated) 94%, transparent), color-mix(in srgb, var(--color-bg) 90%, #ffffff));
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.32s cubic-bezier(.22,.61,.36,1), border-color 0.28s ease, box-shadow 0.3s ease;
    transform: translateY(10px);
    opacity: 0;
}

.topic-card::before {
    content: "";
    position: absolute;
    inset: 0 auto auto 0;
    width: 100%;
    height: 6px;
}

.card-health::before { background: var(--color-warn); }
.card-equip::before { background: var(--color-accent); }
.card-insurance::before { background: var(--color-brand-deep); }

.topic-card::after {
    content: "";
    position: absolute;
    width: 140%;
    height: 140%;
    left: -20%;
    top: -36%;
    transform: translateY(-105%);
    transition: transform 0.36s cubic-bezier(.22,.61,.36,1);
    background: linear-gradient(120deg, transparent 30%, color-mix(in srgb, white 65%, transparent) 48%, transparent 64%);
    pointer-events: none;
}

.card-content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}

.topic-icon {
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    margin-bottom: 20px;
    font-size: 24px;
    border: 1px solid var(--color-line);
    transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease;
}

.card-health .topic-icon {
    color: var(--color-warn);
    background: color-mix(in srgb, var(--color-warn) 8%, transparent);
}

.card-equip .topic-icon {
    color: var(--color-accent);
    background: color-mix(in srgb, var(--color-accent) 10%, transparent);
}

.card-insurance .topic-icon {
    color: var(--color-brand-deep);
    background: color-mix(in srgb, var(--color-brand) 10%, transparent);
}

.topic-text h3 {
    margin: 0 0 14px;
    font-family: "Noto Serif TC", serif;
    font-size: 1.55rem;
    font-weight: 700;
    line-height: 1.25;
    color: var(--color-text);
}

.topic-text ul {
    margin: 0;
    padding: 0;
    list-style: none;
}

.topic-text ul li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.96rem;
    line-height: 1.6;
    color: var(--color-muted);
    margin-bottom: 8px;
}

.topic-text ul li i {
    font-size: 0.74rem;
    color: color-mix(in srgb, var(--color-brand-deep) 60%, var(--color-line));
}

.card-arrow {
    align-self: flex-end;
    margin-top: 20px;
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    border: 1px solid var(--color-line);
    color: var(--color-muted);
    background: color-mix(in srgb, var(--color-bg-elevated) 90%, transparent);
    transition: transform 0.24s ease, background-color 0.24s ease, color 0.24s ease, border-color 0.24s ease;
}

.dc-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
}

@media (hover: hover) {
    .topic-card:hover {
        transform: translateY(-8px);
        border-color: color-mix(in srgb, var(--color-brand) 26%, var(--color-line));
        box-shadow: 0 12px 24px color-mix(in srgb, var(--color-brand) 12%, transparent);
    }

    .topic-card:hover::after {
        transform: translateY(0);
    }

    .topic-card:hover .topic-icon {
        transform: translateY(-2px) scale(1.02);
    }

    .topic-card:hover .card-arrow {
        color: var(--color-bg-elevated);
        background: var(--color-brand-deep);
        border-color: var(--color-brand-deep);
        transform: translateX(4px);
    }
}

@media (max-width: 1024px) {
    .topic-container {
        grid-template-columns: 1fr;
        gap: 16px;
    }

    .topic-card {
        min-height: 0;
    }

    .topic-header h2 {
        font-size: clamp(1.7rem, 7vw, 2.3rem);
    }
}

@media (prefers-reduced-motion: reduce) {
    .dc-home *,
    .dc-home *::before,
    .dc-home *::after {
        animation: none !important;
        transition: none !important;
    }

    .topic-card,
    .dc-reveal {
        opacity: 1 !important;
        transform: none !important;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    var section = document.querySelector(".dc-home");
    if (!section) return;

    var prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var reveals = section.querySelectorAll(".dc-reveal");

    if (!prefersReduced && "IntersectionObserver" in window) {
        var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    entry.target.classList.add("is-visible");
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.2 });

        reveals.forEach(function (el, idx) {
            el.style.transitionDelay = (idx * 70) + "ms";
            observer.observe(el);
        });
    } else {
        reveals.forEach(function (el) { el.classList.add("is-visible"); });
    }

    if (prefersReduced || !window.matchMedia("(hover: hover)").matches) return;

    section.querySelectorAll(".dc-card").forEach(function (card) {
        card.addEventListener("mousemove", function (event) {
            var rect = card.getBoundingClientRect();
            var px = ((event.clientX - rect.left) / rect.width - 0.5) * 8;
            var py = ((event.clientY - rect.top) / rect.height - 0.5) * -8;
            card.style.transform = "translateY(-8px) rotateX(" + py + "deg) rotateY(" + px + "deg)";
        });

        card.addEventListener("mouseleave", function () {
            card.style.transform = "";
        });
    });
});
</script>
</div>
