<p><!-- =======================================================
     CSS 樣式表
     ======================================================= --></p>
<style>
/* --- 外層容器 --- */
.topic-nav-wrapper {
    width: 100%;
    padding: 20px 0;
    font-family: "Noto Sans TC", sans-serif;
}</p>
<p>/* --- 標題區樣式 --- */
.topic-header {
    text-align: center;
    margin-bottom: 30px;
}
.topic-header h2 {
    font-size: 1.8rem;
    color: #333;
    font-weight: 800;
    margin-bottom: 10px;
}
.topic-header .highlight {
    color: var(--brand); /* 尊嚴綠 */
    position: relative;
    display: inline-block;
}
/* 標題下方的裝飾線 */
.topic-header .highlight::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    height: 8px;
    background: rgba(212, 160, 23, 0.3); /* 金黃色半透明 */
    z-index: -1;
}
.topic-header p {
    color: #666;
    font-size: 1rem;
}</p>
<p>/* --- 卡片容器 (Flex排版：電腦版橫排，手機版直排) --- */
.topic-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}</p>
<p>/* --- 卡片通用樣式 --- */
.topic-card {
    flex: 1;
    min-width: 280px; /* 卡片最小寬度 */
    background: #fff;
    border-radius: var(--radius-card);
    padding: 30px 25px;
    text-decoration: none;
    color: #333;
    border: 1px solid #eee;
    box-shadow: 0 5px 15px rgba(0,0,0,0.03);
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
}</p>
<p>/* 頂部彩色線條 (依卡片類型不同) */
.topic-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 5px;
    background: #ccc;
    transition: height 0.3s ease;
}
.card-health::before { background: #e74c3c; }    /* 健康-紅色 */
.card-equip::before { background: #f39c12; }     /* 裝備-橘色 */
.card-insurance::before { background: var(--brand); } /* 保險-綠色 */</p>
<p>/* --- 卡片內容區 --- */
.card-content {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
}</p>
<p>/* 圖示圓圈 */
.topic-icon {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 20px;
    transition: all 0.3s ease;
}
.card-health .topic-icon { color: #e74c3c; background: #fdedec; }
.card-equip .topic-icon { color: #f39c12; background: #fef5e7; }
.card-insurance .topic-icon { color: var(--brand); background: var(--brand-light); }</p>
<p>/* 文字內容 */
.topic-text h3 {
    font-size: 1.4rem;
    font-weight: 700;
    margin: 0 0 15px 0;
    color: #222;
}</p>
<p>.topic-text ul {
    list-style: none;
    padding: 0;
    margin: 0;
}
.topic-text ul li {
    font-size: 0.95rem;
    color: #666;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.topic-text ul li i {
    font-size: 0.8rem;
    color: #aaa; /* 打勾符號顏色 */
}</p>
<p>/* --- 右下角箭頭 --- */
.card-arrow {
    align-self: flex-end;
    margin-top: 20px;
    width: 35px; height: 35px;
    border-radius: 50%;
    background: #f0f0f0;
    color: #999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}</p>
<p>/* --- 滑鼠懸停特效 (Hover) --- */
.topic-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.08);
}
.topic-card:hover::before {
    height: 100%; /* 背景色填滿效果 */
    opacity: 0.05; /* 讓背景色變淡，不影響文字閱讀 */
}
.topic-card:hover .card-arrow {
    background: #333;
    color: #fff;
    transform: translateX(5px);
}</p>
<p>/* 手機版適應 */
@media (max-width: 768px) {
    .topic-container {
        flex-direction: column; /* 手機版改為直排 */
    }
}
</style>
